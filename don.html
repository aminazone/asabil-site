<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faire un don — A-Sabil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Montserrat:wght@400;500;600;700&family=Martel+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Montserrat', sans-serif; background: #fff; color: #022935; overflow-x: hidden; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 80px;
      background: rgba(2,41,53,0.92); backdrop-filter: blur(12px);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-circle {
      width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid #57C6FF;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-text { color: #fff; font-family: 'Lilita One', cursive; font-size: 18px; letter-spacing: 1px; }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a {
      color: #fff; text-decoration: none; font-size: 14px; font-weight: 600;
      letter-spacing: 0.5px; transition: color .2s;
    }
    .nav-links a:hover { color: #57C6FF; }
    .nav-ctas { display: flex; gap: 12px; align-items: center; }
    .btn-nav-don {
      background: #57C6FF; color: #022935; border: none; border-radius: 25px;
      padding: 10px 24px; font-weight: 700; font-size: 14px; cursor: pointer;
      font-family: 'Montserrat', sans-serif; transition: opacity .2s;
    }
    .btn-nav-don:hover { opacity: 0.85; }
    .btn-nav-parrain {
      background: transparent; color: #EA5600; border: 1.5px solid #EA5600;
      border-radius: 25px; padding: 10px 24px; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: 'Montserrat', sans-serif; transition: all .2s;
    }
    .btn-nav-parrain:hover { background: #EA5600; color: #fff; }

    /* HERO */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding-bottom: 80px; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #022935 0%, #0a4a60 60%, #57C6FF44 100%);
    }
    .hero-bg-pattern {
      position: absolute; inset: 0; opacity: 0.06;
      background-image: radial-gradient(circle at 20% 50%, #57C6FF 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, #EA5600 0%, transparent 40%);
    }
    /* placeholder photo */
    .hero-photo-placeholder {
      position: absolute; right: 0; top: 0; bottom: 0; width: 55%;
      background: repeating-linear-gradient(
        45deg, #0a3040 0px, #0a3040 10px, #0d3a4c 10px, #0d3a4c 20px
      );
      clip-path: polygon(8% 0, 100% 0, 100% 100%, 0% 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .hero-photo-label {
      color: rgba(87,198,255,0.4); font-family: monospace; font-size: 13px;
      text-align: center; writing-mode: vertical-rl; letter-spacing: 2px;
    }
    .hero-content {
      position: relative; z-index: 2;
      max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 48px;
      padding-top: 140px;
    }
    .hero-label {
      display: inline-block; background: #EA5600; color: #fff;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      padding: 5px 14px; border-radius: 20px; margin-bottom: 18px;
      text-transform: uppercase;
    }
    .hero-title {
      font-family: 'Lilita One', cursive;
      font-size: clamp(40px, 5vw, 72px);
      color: #fff; line-height: 1.05;
      max-width: 520px; margin-bottom: 20px;
    }
    .hero-title span { color: #57C6FF; }
    .hero-sub {
      color: rgba(255,255,255,0.75); font-size: 16px; line-height: 1.6;
      max-width: 440px; margin-bottom: 40px;
    }
    .hero-stats { display: flex; gap: 40px; margin-bottom: 56px; }
    .hero-stat-num {
      font-family: 'Lilita One', cursive; font-size: 36px; color: #57C6FF;
    }
    .hero-stat-label { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    /* DON WIDGET */
    .don-widget {
      background: #fff; border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      padding: 32px 36px; max-width: 580px;
      position: relative; z-index: 5;
    }
    .don-widget-title {
      font-family: 'Lilita One', cursive; font-size: 22px;
      color: #022935; margin-bottom: 20px;
    }
    .don-tabs {
      display: flex; gap: 0; background: #f0f4f6;
      border-radius: 30px; padding: 4px; margin-bottom: 24px;
    }
    .don-tab {
      flex: 1; text-align: center; padding: 10px 0;
      border-radius: 26px; font-weight: 700; font-size: 13px;
      cursor: pointer; border: none; background: transparent;
      color: #022935; font-family: 'Montserrat', sans-serif;
      transition: all .2s; letter-spacing: 0.5px;
    }
    .don-tab.active { background: #57C6FF; color: #022935; }

    .don-projet-label { font-size: 12px; font-weight: 700; color: #022935; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .don-projets-scroll {
      display: flex; gap: 8px; overflow-x: auto; margin-bottom: 22px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .don-projets-scroll::-webkit-scrollbar { display: none; }
    .don-projet-chip {
      flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid #dde3e6; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; background: #fff; color: #022935;
      transition: all .2s; font-family: 'Montserrat', sans-serif;
    }
    .don-projet-chip.active { background: #022935; border-color: #022935; color: #fff; }
    .don-projet-chip:hover:not(.active) { border-color: #57C6FF; color: #57C6FF; }

    .don-amounts {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px; margin-bottom: 12px;
    }
    .don-amount-btn {
      padding: 12px 0; border-radius: 12px; border: 1.5px solid #dde3e6;
      font-weight: 700; font-size: 15px; cursor: pointer; background: #fff;
      color: #022935; font-family: 'Montserrat', sans-serif; transition: all .2s;
    }
    .don-amount-btn.active { background: #022935; border-color: #022935; color: #fff; }
    .don-amount-btn:hover:not(.active) { border-color: #57C6FF; color: #57C6FF; }
    .don-amount-btn.libre { grid-column: span 2; border-color: #EA5600; color: #EA5600; }
    .don-amount-btn.libre.active { background: #EA5600; border-color: #EA5600; color: #fff; }

    .don-custom-input {
      display: flex; align-items: center; gap: 0; margin-bottom: 20px;
      border: 1.5px solid #dde3e6; border-radius: 12px; overflow: hidden;
    }
    .don-custom-input.focused { border-color: #57C6FF; }
    .don-custom-currency {
      padding: 12px 16px; background: #f0f4f6;
      font-weight: 700; color: #022935; font-size: 16px;
    }
    .don-custom-input input {
      flex: 1; border: none; outline: none; padding: 12px 14px;
      font-size: 16px; font-weight: 700; font-family: 'Montserrat', sans-serif;
      color: #022935;
    }
    .don-impact-hint {
      font-size: 12px; color: #EA5600; font-weight: 600;
      margin-bottom: 18px; min-height: 18px; transition: all .3s;
    }
    .btn-don-cta {
      width: 100%; padding: 16px; background: #022935; color: #fff;
      border: none; border-radius: 30px; font-size: 16px; font-weight: 700;
      font-family: 'Montserrat', sans-serif; cursor: pointer;
      transition: background .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-don-cta:hover { background: #0a3a4d; transform: translateY(-1px); }
    .don-reassure {
      text-align: center; font-size: 11px; color: #999;
      margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .don-mensuel-badge {
      background: #57C6FF22; border: 1px solid #57C6FF44; color: #0a3a4d;
      border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600;
      margin-bottom: 18px; display: none;
    }
    .don-mensuel-badge.show { display: block; }

    /* SECTION PROJETS */
    section { width: 100%; }
    .section-projets { padding: 100px 48px; background: #f8fafb; }
    .section-header { text-align: center; margin-bottom: 56px; }
    .section-eyebrow {
      display: inline-block; font-size: 12px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: #EA5600;
      margin-bottom: 12px;
    }
    .section-title {
      font-family: 'Lilita One', cursive; font-size: clamp(32px, 4vw, 52px);
      color: #022935; line-height: 1.1;
    }
    .section-title span { color: #57C6FF; }
    .section-sub { font-size: 16px; color: #5a7a85; margin-top: 14px; max-width: 540px; margin-left: auto; margin-right: auto; line-height: 1.6; }

    .projets-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; max-width: 1200px; margin: 0 auto;
    }
    .projet-card {
      background: #fff; border-radius: 20px;
      overflow: hidden; cursor: pointer;
      box-shadow: 0 2px 16px rgba(2,41,53,0.07);
      transition: transform .25s, box-shadow .25s;
      border: 2px solid transparent;
    }
    .projet-card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(2,41,53,0.14); }
    .projet-card.selected { border-color: #57C6FF; }
    .projet-card-img {
      height: 180px;
      background: repeating-linear-gradient(
        135deg, #e8f4f8 0px, #e8f4f8 8px, #d4eaf2 8px, #d4eaf2 16px
      );
      display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-size: 11px; color: rgba(2,41,53,0.3);
      text-align: center; padding: 20px;
    }
    .projet-card-img.forage { background: repeating-linear-gradient(135deg, #cce8f4 0px, #cce8f4 8px, #b8dff0 8px, #b8dff0 16px); }
    .projet-card-img.plantation { background: repeating-linear-gradient(135deg, #d4edcc 0px, #d4edcc 8px, #c3e4b8 8px, #c3e4b8 16px); }
    .projet-card-img.ecole { background: repeating-linear-gradient(135deg, #fce8cc 0px, #fce8cc 8px, #f8ddb8 8px, #f8ddb8 16px); }
    .projet-card-img.zakat { background: repeating-linear-gradient(135deg, #e8d4f8 0px, #e8d4f8 8px, #dfc4f4 8px, #dfc4f4 16px); }
    .projet-card-img.aid { background: repeating-linear-gradient(135deg, #f8e0cc 0px, #f8e0cc 8px, #f4d0b8 8px, #f4d0b8 16px); }
    .projet-card-img.libre { background: repeating-linear-gradient(135deg, #f0f0f0 0px, #f0f0f0 8px, #e4e4e4 8px, #e4e4e4 16px); }
    .projet-card-body { padding: 22px 24px; }
    .projet-chip-label {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .chip-blue { background: #57C6FF22; color: #0a6080; }
    .chip-green { background: #d4edcc; color: #2d6e1e; }
    .chip-orange { background: #fce8cc; color: #8a3e00; }
    .chip-purple { background: #e8d4f8; color: #5a1e8a; }
    .chip-red { background: #f8e0cc; color: #8a3e00; }
    .chip-gray { background: #f0f0f0; color: #555; }
    .projet-card-title { font-family: 'Lilita One', cursive; font-size: 20px; color: #022935; margin-bottom: 8px; }
    .projet-card-desc { font-size: 13px; color: #5a7a85; line-height: 1.5; margin-bottom: 14px; }
    .projet-card-impact { font-size: 12px; font-weight: 700; color: #EA5600; }
    .projet-card-select {
      margin-top: 14px; width: 100%; padding: 9px; border-radius: 20px;
      border: 1.5px solid #022935; background: transparent; color: #022935;
      font-weight: 700; font-size: 13px; font-family: 'Montserrat', sans-serif;
      cursor: pointer; transition: all .2s;
    }
    .projet-card.selected .projet-card-select { background: #022935; color: #fff; }
    .projet-card-select:hover { background: #022935; color: #fff; }

    /* SECTION IMPACT */
    .section-impact {
      padding: 100px 48px; background: #022935;
      position: relative; overflow: hidden;
    }
    .section-impact::before {
      content: ''; position: absolute; top: -100px; right: -100px;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, #57C6FF22 0%, transparent 70%);
    }
    .section-impact .section-title { color: #fff; }
    .section-impact .section-sub { color: rgba(255,255,255,0.6); }
    .section-impact .section-eyebrow { color: #57C6FF; }
    .impact-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 24px; max-width: 1200px; margin: 0 auto;
    }
    .impact-card {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(87,198,255,0.2);
      border-radius: 20px; padding: 32px 24px; text-align: center;
      transition: background .2s, transform .2s;
    }
    .impact-card:hover { background: rgba(87,198,255,0.1); transform: translateY(-4px); }
    .impact-amount {
      font-family: 'Lilita One', cursive; font-size: 42px; color: #57C6FF;
      line-height: 1; margin-bottom: 6px;
    }
    .impact-equals { font-size: 20px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
    .impact-icon { font-size: 36px; margin-bottom: 12px; }
    .impact-desc { font-size: 14px; color: rgba(255,255,255,0.8); line-height: 1.5; font-weight: 500; }
    .impact-btn-cta {
      display: block; margin: 48px auto 0;
      padding: 16px 48px; background: #57C6FF; color: #022935;
      border: none; border-radius: 30px; font-size: 16px; font-weight: 700;
      font-family: 'Montserrat', sans-serif; cursor: pointer;
      transition: opacity .2s, transform .1s; text-align: center;
      text-decoration: none; max-width: 280px;
    }
    .impact-btn-cta:hover { opacity: 0.85; transform: translateY(-2px); }

    /* SECTION TEMOIGNAGES */
    .section-temoignages { padding: 100px 48px; background: #fff; }
    .temoignages-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; max-width: 1200px; margin: 0 auto;
    }
    .temoignage-card {
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(2,41,53,0.09);
      position: relative;
    }
    .temoignage-img {
      height: 220px;
      background: repeating-linear-gradient(
        45deg, #b8d8e8 0px, #b8d8e8 8px, #a8ccdf 8px, #a8ccdf 16px
      );
      display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-size: 11px; color: rgba(2,41,53,0.35);
      text-align: center; padding: 20px;
    }
    .temoignage-body { padding: 24px; background: #fff; }
    .temoignage-quote {
      font-size: 32px; color: #57C6FF; font-family: Georgia, serif;
      line-height: 1; margin-bottom: 10px;
    }
    .temoignage-text { font-size: 14px; color: #022935; line-height: 1.6; font-style: italic; margin-bottom: 14px; }
    .temoignage-author { font-size: 13px; font-weight: 700; color: #EA5600; }
    .temoignage-location { font-size: 12px; color: #999; }

    /* SECTION FORMULAIRE */
    .section-formulaire { padding: 100px 48px; background: #f8fafb; }
    .formulaire-layout {
      display: grid; grid-template-columns: 1fr 420px;
      gap: 60px; max-width: 1200px; margin: 0 auto; align-items: start;
    }
    .form-card {
      background: #fff; border-radius: 24px;
      box-shadow: 0 4px 32px rgba(2,41,53,0.09);
      padding: 40px 44px;
    }
    .form-title { font-family: 'Lilita One', cursive; font-size: 28px; color: #022935; margin-bottom: 8px; }
    .form-subtitle { font-size: 14px; color: #5a7a85; margin-bottom: 32px; }
    .form-section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: #022935; margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 1px solid #e8ecee;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 700; color: #022935; }
    .form-input {
      padding: 12px 16px; border: 1.5px solid #dde3e6; border-radius: 10px;
      font-size: 15px; font-family: 'Montserrat', sans-serif; color: #022935;
      outline: none; transition: border-color .2s;
    }
    .form-input:focus { border-color: #57C6FF; }
    .form-select {
      padding: 12px 16px; border: 1.5px solid #dde3e6; border-radius: 10px;
      font-size: 15px; font-family: 'Montserrat', sans-serif; color: #022935;
      outline: none; background: #fff; cursor: pointer;
    }

    .paiement-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #022935; margin-bottom: 14px; }
    .paiement-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .paiement-method {
      padding: 12px 14px; border: 1.5px solid #dde3e6; border-radius: 12px;
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      transition: all .2s; background: #fff; font-family: 'Montserrat', sans-serif;
    }
    .paiement-method:hover { border-color: #57C6FF; }
    .paiement-method.selected { border-color: #022935; background: #022935; color: #fff; }
    .paiement-method.selected .pm-label { color: #fff; }
    .pm-icon { font-size: 20px; flex-shrink: 0; }
    .pm-label { font-size: 13px; font-weight: 600; color: #022935; }
    .paiement-method.selected .pm-label { color: #fff; }

    .cb-fields { margin-top: 16px; }
    .card-input-row { display: flex; gap: 10px; }

    .fiscal-box {
      background: #f0f9f4; border: 1px solid #57C6FF44; border-radius: 12px;
      padding: 14px 18px; margin: 20px 0; font-size: 13px; color: #022935;
      line-height: 1.5;
    }
    .fiscal-box strong { color: #EA5600; }

    .btn-submit {
      width: 100%; padding: 16px; background: #EA5600; color: #fff;
      border: none; border-radius: 30px; font-size: 16px; font-weight: 700;
      font-family: 'Montserrat', sans-serif; cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-submit:hover { background: #c94d00; transform: translateY(-1px); }

    /* RECAPITULATIF */
    .recap-card {
      background: #022935; border-radius: 24px; padding: 36px 32px; color: #fff;
      position: sticky; top: 100px;
    }
    .recap-title { font-family: 'Lilita One', cursive; font-size: 22px; margin-bottom: 24px; color: #fff; }
    .recap-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
    .recap-row:last-of-type { border-bottom: none; }
    .recap-label { color: rgba(255,255,255,0.6); }
    .recap-value { font-weight: 700; color: #fff; }
    .recap-total { margin-top: 16px; padding-top: 16px; border-top: 2px solid #57C6FF44; }
    .recap-total-label { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
    .recap-total-amount { font-family: 'Lilita One', cursive; font-size: 44px; color: #57C6FF; line-height: 1; margin-top: 4px; }
    .recap-fiscal { margin-top: 12px; font-size: 12px; color: rgba(87,198,255,0.7); line-height: 1.5; }
    .recap-logos { margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .recap-logo-badge {
      background: rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 12px;
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7);
    }

    /* FOOTER */
    footer {
      background: #57C6FF; padding: 60px 48px 40px;
    }
    .footer-grid {
      display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr;

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PROJECTS = [
  { id: 'forage', label: 'Forage au Mali', chip: 'Eau potable', chipClass: 'chip-blue', imgClass: 'forage', desc: 'Construire un forage pour donner accès à l\'eau potable à un village entier au Mali.', impact: '1 500€ = 1 forage complet', imgAlt: 'photo forage' },
  { id: 'plantation', label: 'Plantation d\'arbres', chip: 'Environnement', chipClass: 'chip-green', imgClass: 'plantation', desc: 'Planter des arbres fruitiers pour nourrir des familles et reverdir les terres sahéliennes.', impact: '25€ = 1 arbre planté', imgAlt: 'photo plantation' },
  { id: 'ecole', label: 'École Al-Kawthar', chip: 'Éducation', chipClass: 'chip-orange', imgClass: 'ecole', desc: 'Parrainer un enfant à l\'école Al-Kawthar pour lui offrir une éducation de qualité.', impact: '50€/mois = 1 enfant parrainé', imgAlt: 'photo école' },
  { id: 'zakat', label: 'Zakat al-maal', chip: 'Purification', chipClass: 'chip-purple', imgClass: 'zakat', desc: 'Versez votre Zakat al-maal en toute confiance. Distribuée directement aux plus démunis.', impact: '2,5% de votre épargne', imgAlt: 'photo zakat' },
  { id: 'aid', label: 'Aïd al-Adha', chip: 'Sacrifice', chipClass: 'chip-red', imgClass: 'aid', desc: 'Offrez un sacrifice de l\'Aïd à une famille dans le besoin au Mali.', impact: '150€ = 1 mouton distribué', imgAlt: 'photo aïd' },
  { id: 'libre', label: 'Don libre', chip: 'Général', chipClass: 'chip-gray', imgClass: 'libre', desc: 'Faites confiance à A-Sabil pour affecter votre don là où il est le plus nécessaire.', impact: 'Impact sur tous nos projets', imgAlt: 'photo équipe' },
];

const AMOUNTS_UNIQUE = [10, 25, 50, 100, 200, 400];
const AMOUNTS_MENSUEL = [5, 10, 25, 50, 100, 200];

const IMPACT_MAP = {
  forage: { 5: null, 10: null, 25: null, 50: null, 100: '6.7% d\'un forage financé', 200: '13% d\'un forage financé', 400: '27% d\'un forage financé', 1500: '1 forage complet !' },
  plantation: { 5: null, 10: '10 arbres plantés', 25: '1 arbre fruitier planté', 50: '2 arbres fruitiers plantés', 100: '4 arbres fruitiers plantés', 200: '8 arbres fruitiers plantés', 400: '16 arbres fruitiers plantés' },
  ecole: { 5: null, 10: '10% de la scolarité d\'un enfant/mois', 25: '50% de la scolarité d\'un enfant/mois', 50: '1 mois de scolarité pour un enfant', 100: '2 mois pour un enfant', 200: '4 mois pour un enfant', 400: '8 mois pour un enfant' },
  zakat: { 5: null, 10: null, 25: null, 50: null, 100: null, 200: null, 400: 'Zakat sur ~16 000€ d\'épargne annuelle' },
  aid: { 5: null, 10: null, 25: null, 50: '33% d\'un mouton', 100: '67% d\'un mouton', 200: '1 mouton distribué', 400: '2 familles nourries' },
  libre: { 5: null, 10: null, 25: null, 50: null, 100: null, 200: null, 400: null },
};

function getImpactHint(project, amount) {
  const map = IMPACT_MAP[project];
  if (!map) return null;
  // find closest key
  const keys = Object.keys(map).map(Number).sort((a,b)=>a-b);
  let best = null;
  for (const k of keys) { if (amount >= k) best = map[k]; }
  return best;
}

  const amounts = tab === 'unique' ? AMOUNTS_UNIQUE : AMOUNTS_MENSUEL;
  const currentAmount = customMode ? (parseInt(customValue) || 0) : selectedAmount;
  const impactHint = getImpactHint(selectedProject, currentAmount);

  return (
    <div className="don-widget">
      <div className="don-widget-title">🤲 Votre don</div>
      <div className="don-tabs">
        {['unique','mensuel'].map(t => (

        ))}
      </div>
      <div className="don-amounts">
        {amounts.map(a => (
          <button key={a}
            className={`don-amount-btn ${!customMode && selectedAmount===a ? 'active':''}`}
            onClick={()=>{ setSelectedAmount(a); setCustomMode(false); }}>
            {a}€
          </button>
        ))}
        <button
          className={`don-amount-btn libre ${customMode?'active':''}`}
          onClick={()=>setCustomMode(true)}>
          Montant libre
        </button>
        <button
          className={`don-amount-btn ${!customMode && selectedAmount === (tab==='unique'?400:200) ? '' : ''}`}
          style={{display:'none'}}>
        </button>
      </div>
      {customMode && (
        <div className={`don-custom-input ${focused?'focused':''}`}>
          <span className="don-custom-currency">€</span>
          <input
            type="number" placeholder="Votre montant"
            value={customValue}
            onChange={e=>setCustomValue(e.target.value)}
            onFocus={()=>setFocused(true)}
            onBlur={()=>setFocused(false)}
            min="1"

        </div>
      )}
      <div className="don-impact-hint">
        {impactHint ? `✦ ${impactHint}` : ''}
      </div>
      <button className="btn-don-cta" onClick={scrollToForm}>
        <span>Je donne {currentAmount > 0 ? `${currentAmount}€` : ''} {tab==='mensuel' ? '/mois' : ''}</span>
        <span>→</span>
      </button>
      <div className="don-reassure">
        <span>🔒</span>
        <span>Paiement sécurisé · Reçu fiscal disponible</span>
      </div>
    </div>
  );
}

function App() {
  const [selectedProject, setSelectedProject] = useState('forage');
  const formRef = useRef(null);

  const scrollToForm = () => {
    const el = document.getElementById('formulaire');
    if (el) window.scrollTo({ top: el.offsetTop - 90, behavior: 'smooth' });
  };

  // Fade-up observer
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

  return (
    <>
      {/* HERO */}
      <section className="hero">
        <div className="hero-bg"></div>
        <div className="hero-bg-pattern"></div>
        <div className="hero-photo-placeholder">
          <span className="hero-photo-label">photo terrain<br/>Mali</span>
        </div>
        <div className="hero-content">
          <span className="hero-label">Association humanitaire</span>
          <h1 className="hero-title">Agissons<br/>ensemble<br/><span>pour le bien</span></h1>
          <p className="hero-sub">Votre don soutient des actions concrètes et durables — eau potable, éducation, alimentation — auprès des populations en difficulté au Mali.</p>
          <div className="hero-stats">
            <div>
              <div className="hero-stat-num">47</div>
              <div className="hero-stat-label">Forages réalisés</div>
            </div>
            <div>
              <div className="hero-stat-num">1 200+</div>
              <div className="hero-stat-label">Arbres plantés</div>
            </div>
            <div>
              <div className="hero-stat-num">320</div>
              <div className="hero-stat-label">Enfants parrainés</div>
            </div>
          </div>
          <DonWidget selectedProject={selectedProject} setSelectedProject={setSelectedProject} scrollToForm={scrollToForm} />
        </div>
      </section>

      {/* PROJETS */}
      <section className="section-projets" id="projets">
        <div className="section-header fade-up">
          <span className="section-eyebrow">Choisissez votre cause</span>
          <h2 className="section-title">Nos <span>projets</span></h2>
          <p className="section-sub">Chaque projet cible un besoin essentiel. Sélectionnez celui qui vous touche le plus.</p>
        </div>
        <div className="projets-grid">
          {PROJECTS.map(p => (
            <ProjetCard key={p.id} p={p} selected={selectedProject===p.id} onSelect={setSelectedProject} />
          ))}
        </div>
      </section>

      {/* IMPACT */}
      <section className="section-impact">
        <div className="section-header fade-up">
          <span className="section-eyebrow">Votre impact</span>
          <h2 className="section-title" style={{color:'#fff'}}>Chaque euro <span style={{color:'#57C6FF'}}>compte</span></h2>
          <p className="section-sub" style={{color:'rgba(255,255,255,0.6)'}}>Voici ce que votre don permet concrètement de réaliser sur le terrain.</p>
        </div>
        <div className="impact-grid">
          {[
            { amount: '10€', icon: '🌱', desc: 'Plante 10 semences dans une pépinière communautaire' },
            { amount: '25€', icon: '🌳', desc: 'Finance la plantation d\'un arbre fruitier nourricier' },
            { amount: '50€', icon: '📚', desc: 'Paie un mois de scolarité pour un enfant à l\'école Al-Kawthar' },
            { amount: '150€', icon: '🐑', desc: 'Offre un sacrifice de l\'Aïd à une famille dans le besoin' },
            { amount: '200€', icon: '💧', desc: 'Contribue à 13% de la construction d\'un forage en eau potable' },
            { amount: '500€', icon: '🏫', desc: 'Couvre une année scolaire complète pour un enfant' },
            { amount: '1 000€', icon: '🌊', desc: 'Finance les travaux préparatoires d\'un nouveau forage' },
            { amount: '1 500€', icon: '🚿', desc: 'Finance intégralement un forage au Mali — eau pour 500 personnes' },
          ].map(item => (
            <div key={item.amount} className="impact-card fade-up">
              <div className="impact-amount">{item.amount}</div>
              <div className="impact-equals">=</div>
              <div className="impact-icon">{item.icon}</div>
              <div className="impact-desc">{item.desc}</div>
            </div>
          ))}
        </div>
        <button className="impact-btn-cta" onClick={()=>{ const el=document.getElementById('formulaire'); if(el) window.scrollTo({top:el.offsetTop-90,behavior:'smooth'}); }}>
          Faire un don maintenant
        </button>
      </section>

      {/* TEMOIGNAGES */}
      <section className="section-temoignages">
        <div className="section-header fade-up">
          <span className="section-eyebrow">Sur le terrain</span>
          <h2 className="section-title">Ils ont bénéficié<br/>de <span>votre générosité</span></h2>
        </div>
        <div className="temoignages-grid">
          {[
            { imgLabel: 'Village de Mukadjanbougou — forage Avril 2025', quote: '"Avant ce forage, nos femmes marchaient 8 km chaque jour pour trouver de l\'eau."', author: 'Chef du village', location: 'Mukadjanbougou, Ségou — Mali' },
            { imgLabel: 'École Al-Kawthar — Bamako', quote: '"Grâce au parrainage d\'A-Sabil, ma fille a pu passer son brevet. Elle veut devenir infirmière."', author: 'Fatou, mère de Mariama', location: 'Bamako — Mali' },
            { imgLabel: 'Plantation d\'arbres fruitiers', quote: '"Les manguiers plantés il y a 3 ans nourrissent maintenant 12 familles du quartier."', author: 'Moussa, agriculteur', location: 'Kayes — Mali' },
          ].map((t, i) => (
            <div key={i} className="temoignage-card fade-up">
              <div className="temoignage-img"><span>{t.imgLabel}</span></div>
              <div className="temoignage-body">
                <div className="temoignage-quote">"</div>
                <div className="temoignage-text">{t.quote}</div>
                <div className="temoignage-author">{t.author}</div>
                <div className="temoignage-location">{t.location}</div>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* FORMULAIRE */}
      <FormulaireSection selectedProject={selectedProject} setSelectedProject={setSelectedProject} />

      {/* FOOTER */}
      <footer>
        <div className="footer-grid">
          <div className="footer-brand">
            <div className="footer-logo">
              <div className="footer-logo-circle">
                <img src="assets/logo-vector.svg" alt="A-Sabil" style={{width:'28px',height:'28px'}} />
              </div>
              <span className="footer-logo-name">A-SABIL</span>
            </div>
            <div className="footer-tagline">Association humanitaire agissant pour l'eau, l'éducation et l'alimentation au Mali.</div>
            <div className="footer-addr">
              A-Sabil France<br/>
              12 rue Sadi Carnot<br/>
              93170 Bagnolet, France<br/><br/>
              contact@a-sabil.org
            </div>
          </div>
          <div>
            <div className="footer-col-title">À propos</div>
            <ul className="footer-links">
              <li><a href="#">Nous connaître</a></li>
              <li><a href="#">Nos objectifs</a></li>
              <li><a href="#">A-Sabil Mali</a></li>
            </ul>
          </div>
          <div>
            <div className="footer-col-title">Nos actions</div>
            <ul className="footer-links">
              <li><a href="#">Plantation d'arbres</a></li>
              <li><a href="#">Parrainez l'école</a></li>
              <li><a href="#">Forages au Mali</a></li>
              <li><a href="#">Aïd al-Adha</a></li>
            </ul>
          </div>
          <div>
            <div className="footer-col-title">Nos réseaux</div>
            <ul className="footer-links">
              <li><a href="#">@asabil_mali</a></li>
              <li><a href="#">asab-2_asso</a></li>
            </ul>
            <div className="footer-social">
              <a href="#" className="social-btn">IG</a>
              <a href="#" className="social-btn">TW</a>
              <a href="#" className="social-btn">FB</a>
            </div>
          </div>
        </div>
        <div className="footer-bottom">
          <span>© 2025 A-Sabil — Association loi 1901</span>
          <span>Mentions légales · Politique de confidentialité</span>
        </div>
      </footer>
    </>
  );
}
