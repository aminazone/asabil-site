  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #022935;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 80px;
      background: rgba(2,41,53,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(87,198,255,0.1);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-circle {
      width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid #57C6FF;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-text { color: #fff; font-family: 'Lilita One', cursive; font-size: 18px; letter-spacing: 1px; }
    .nav-home {
      color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px;
      font-weight: 600; transition: color .2s;
    }
    .nav-home:hover { color: #57C6FF; }

    /* BG CANVAS */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .bg-orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
    }
    .orb1 { width: 600px; height: 600px; background: #57C6FF; top: -200px; right: -100px; animation: float1 8s ease-in-out infinite; }
    .orb2 { width: 400px; height: 400px; background: #EA5600; bottom: -100px; left: -100px; animation: float2 10s ease-in-out infinite; }
    .orb3 { width: 300px; height: 300px; background: #57C6FF; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: float3 12s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,40px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,-30px)} }
    @keyframes float3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.2)} }

    /* CONFETTI */
    .confetti-container { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .confetti-piece {
      position: absolute; width: 10px; height: 10px; opacity: 0;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* MAIN CONTENT */
    .main {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 100px 24px 60px;
    }

    /* CHECK CIRCLE */
    .check-circle {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, #57C6FF, #022935);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 0 0 0 rgba(87,198,255,0.4);
      animation: pulse-ring 2s ease-out 0.5s;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(87,198,255,0.4); }
      70% { box-shadow: 0 0 0 40px rgba(87,198,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(87,198,255,0); }
    }
    .check-icon {
      font-size: 48px; animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
    }
    @keyframes pop-in {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .merci-eyebrow {
      font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      color: #57C6FF; margin-bottom: 12px;
      animation: fade-up 0.5s ease 0.3s both;
    }
    .merci-title {
      font-family: 'Lilita One', cursive;
      font-size: clamp(40px, 6vw, 80px);
      color: #fff; text-align: center; line-height: 1.05;
      margin-bottom: 20px;
      animation: fade-up 0.5s ease 0.4s both;
    }
    .merci-title span { color: #57C6FF; }
    .merci-sub {
      font-size: 18px; color: rgba(255,255,255,0.7); text-align: center;
      max-width: 540px; line-height: 1.6; margin-bottom: 48px;
      animation: fade-up 0.5s ease 0.5s both;
    }
    @keyframes fade-up {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* RECAP CARD */
    .recap-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; max-width: 780px; width: 100%;
      margin-bottom: 48px;
      animation: fade-up 0.5s ease 0.6s both;
    }
    .recap-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(87,198,255,0.2);
      border-radius: 16px; padding: 24px 20px; text-align: center;
      transition: background .2s;
    }
    .recap-item:hover { background: rgba(87,198,255,0.1); }
    .recap-item-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); margin-bottom: 8px; font-weight: 700; }
    .recap-item-value { font-family: 'Lilita One', cursive; font-size: 28px; color: #fff; line-height: 1; }
    .recap-item-value.blue { color: #57C6FF; }
    .recap-item-value.orange { color: #EA5600; }

    /* FISCAL BOX */
    .fiscal-banner {
      background: rgba(87,198,255,0.08);
      border: 1px solid rgba(87,198,255,0.25);
      border-radius: 16px; padding: 20px 28px;
      max-width: 780px; width: 100%;
      margin-bottom: 48px; text-align: center;
      animation: fade-up 0.5s ease 0.7s both;
    }
    .fiscal-banner strong { color: #57C6FF; }
    .fiscal-banner p { font-size: 14px; color: rgba(255,255,255,0.75); line-height: 1.6; }

    /* PROCHAINES ÉTAPES */
    .steps-section {
      max-width: 780px; width: 100%; margin-bottom: 48px;
      animation: fade-up 0.5s ease 0.8s both;
    }
    .steps-title { font-family: 'Lilita One', cursive; font-size: 24px; color: #fff; text-align: center; margin-bottom: 24px; }
    .steps-list { display: flex; flex-direction: column; gap: 12px; }
    .step-item {
      display: flex; align-items: flex-start; gap: 16px;

    .step-num {

    }
    .step-content { flex: 1; }
    .step-heading { font-weight: 700; color: #fff; font-size: 15px; margin-bottom: 4px; }
    .step-desc { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; }
    .step-check { color: #57C6FF; font-size: 18px; }

    /* PARTAGE */
    .share-section {
      text-align: center; max-width: 780px; width: 100%;
      animation: fade-up 0.5s ease 0.9s both;
    }
    .share-title { font-family: 'Lilita One', cursive; font-size: 24px; color: #fff; margin-bottom: 8px; }
    .share-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
    .share-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .share-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-radius: 30px; font-weight: 700; font-size: 14px;
      cursor: pointer; border: none; font-family: 'Montserrat', sans-serif;
      transition: opacity .2s, transform .1s; text-decoration: none;
    }
    .share-btn:hover { opacity: 0.85; transform: translateY(-2px); }
    .share-fb { background: #1877F2; color: #fff; }
    .share-tw { background: #1DA1F2; color: #fff; }
    .share-wa { background: #25D366; color: #fff; }
    .share-copy { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

    /* CTA retour */
    .back-ctas {
      display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
      margin-top: 48px;
      animation: fade-up 0.5s ease 1s both;
    }
    .btn-back-home {
      padding: 14px 36px; background: #57C6FF; color: #022935;
      border: none; border-radius: 30px; font-size: 15px; font-weight: 700;
      font-family: 'Montserrat', sans-serif; cursor: pointer;
      text-decoration: none; transition: opacity .2s, transform .1s;

    .btn-back-home:hover { opacity: 0.85; transform: translateY(-2px); }
    .btn-another-don {
      padding: 14px 36px; background: transparent; color: #fff;

      font-size: 15px; font-weight: 700; font-family: 'Montserrat', sans-serif;
      cursor: pointer; text-decoration: none; transition: all .2s;
    }
    .btn-another-don:hover { border-color: #57C6FF; color: #57C6FF; }

    /* IMPACT EN COURS */
    .impact-live {
      max-width: 780px; width: 100%; margin-top: 56px;
      animation: fade-up 0.5s ease 1.1s both;
    }
    .impact-live-title { font-family: 'Lilita One', cursive; font-size: 22px; color: #fff; text-align: center; margin-bottom: 20px; }
    .impact-live-bar-wrapper { background: rgba(255,255,255,0.08); border-radius: 30px; height: 12px; margin-bottom: 8px; overflow: hidden; }
    .impact-live-bar { height: 100%; border-radius: 30px; background: linear-gradient(90deg, #57C6FF, #EA5600); width: 0%; transition: width 1.5s ease 1.2s; }
    .impact-live-labels { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
    .impact-live-label-bold { color: #57C6FF; font-weight: 700; }

    /* FOOTER */
    footer {
      position: relative; z-index: 2;
      background: rgba(0,0,0,0.3);
      border-top: 1px solid rgba(87,198,255,0.1);
      padding: 30px 48px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: rgba(255,255,255,0.3);
    }
    footer a { color: rgba(87,198,255,0.5); text-decoration: none; }

    @media (max-width: 700px) {
      nav { padding: 0 20px; }
      .main { padding: 100px 16px 60px; }
      .recap-grid { grid-template-columns: 1fr 1fr; }
      .share-btns { flex-direction: column; align-items: center; }
      .back-ctas { flex-direction: column; align-items: center; }
      footer { flex-direction: column; gap: 8px; text-align: center; padding: 20px; }
    }
  </style>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script type="text/babel">
const { useState, useEffect, useRef } = React;

// Confetti generator
function launchConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#57C6FF', '#EA5600', '#fff', '#022935', '#FFD700'];
  const shapes = ['■', '●', '◆', '▲', '★'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.textContent = shapes[Math.floor(Math.random() * shapes.length)];
    piece.style.cssText = `
      left: ${Math.random() * 100}%;
      top: -20px;
      color: ${colors[Math.floor(Math.random() * colors.length)]};
      font-size: ${8 + Math.random() * 12}px;
      animation-duration: ${2 + Math.random() * 3}s;
      animation-delay: ${Math.random() * 1.5}s;
    `;
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}

function CountUp({ target, duration = 1500, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = null;
    const step = (ts) => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      setVal(Math.floor(progress * target));
      if (progress < 1) requestAnimationFrame(step);
    };
    const timer = setTimeout(() => requestAnimationFrame(step), 600);
    return () => clearTimeout(timer);
  }, [target, duration]);
  return <>{val.toLocaleString('fr-FR')}{suffix}</>;
}

function App() {
  const [barWidth, setBarWidth] = useState(0);
  const [copied, setCopied] = useState(false);

  // Simulated values (would come from URL params in real implementation)
  const don = { montant: 50, projet: 'Forage au Mali', type: 'Don unique', prenom: 'Ahmed' };
  const fiscalReste = Math.round(don.montant * 0.34);

  useEffect(() => {
    launchConfetti();
    setTimeout(() => setBarWidth(67), 800);
  }, []);

  const handleCopy = () => {
    navigator.clipboard.writeText('https://a-sabil.org/don').then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <main className="main">
      <div className="check-circle">
        <span className="check-icon">✓</span>
      </div>

      <div className="merci-eyebrow">Don confirmé avec succès</div>
      <h1 className="merci-title">
        Barakallahu fik,<br/><span>{don.prenom} !</span>
      </h1>
      <p className="merci-sub">
        Votre don de <strong style={{color:'#57C6FF'}}>{don.montant}€</strong> pour <strong style={{color:'#fff'}}>{don.projet}</strong> a bien été reçu. 
        Ensemble, nous construisons un avenir meilleur.
      </p>

      {/* RECAP */}
      <div className="recap-grid">
        <div className="recap-item">
          <div className="recap-item-label">Montant</div>
          <div className="recap-item-value blue">
            <CountUp target={don.montant} />€
          </div>
        </div>
        <div className="recap-item">
          <div className="recap-item-label">Projet soutenu</div>
          <div style={{fontFamily:'Lilita One, cursive', fontSize:18, color:'#fff', lineHeight:1.2, marginTop:4}}>
            {don.projet}
          </div>
        </div>
        <div className="recap-item">
          <div className="recap-item-label">Coût réel</div>
          <div className="recap-item-value orange">
            ~{fiscalReste}€
          </div>
          <div style={{fontSize:10, color:'rgba(255,255,255,0.4)', marginTop:4}}>après déduction fiscale</div>
        </div>
      </div>

      {/* FISCAL */}
      <div className="fiscal-banner">
        <p>
          📧 Un <strong>reçu fiscal</strong> vous sera envoyé par email dans les 48h.
          Il vous permettra de déclarer votre don et bénéficier d'une <strong>réduction d'impôt</strong>.<br/>
          Votre don revient à seulement <strong>~{fiscalReste}€</strong> après déduction.
        </p>
      </div>

      {/* PROCHAINES ÉTAPES */}
      <div className="steps-section">
        <div className="steps-title">Et maintenant ?</div>
        <div className="steps-list">
          {[
            { heading: 'Email de confirmation', desc: 'Un email récapitulatif vient d\'être envoyé à votre adresse avec les détails de votre don.', done: true },
            { heading: 'Reçu fiscal (sous 48h)', desc: 'Votre reçu fiscal sera envoyé séparément pour votre déclaration d\'impôts.', done: false },
            { heading: 'Votre don en action', desc: 'Nos équipes au Mali seront informées et affecteront votre contribution au projet choisi.', done: false },
            { heading: 'Rapport d\'impact', desc: 'Vous recevrez des nouvelles du terrain et des photos de l\'avancement du projet.', done: false },
          ].map((s, i) => (
            <div key={i} className="step-item">
              <div className="step-num" style={s.done ? {background:'#4caf50'} : {}}>{s.done ? '✓' : i + 1}</div>
              <div className="step-content">
                <div className="step-heading">{s.heading}</div>
                <div className="step-desc">{s.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* BARRE DE PROGRESSION FORAGE */}
      <div className="impact-live">
        <div className="impact-live-title">🚿 Forage de Mukadjanbougou — en cours</div>
        <div className="impact-live-bar-wrapper">
          <div className="impact-live-bar" style={{width: `${barWidth}%`}}></div>
        </div>
        <div className="impact-live-labels">
          <span>0€</span>
          <span className="impact-live-label-bold">{barWidth}% financé</span>
          <span>1 500€</span>
        </div>
      </div>

      {/* PARTAGE */}
      <div className="share-section">
        <div className="share-title">Partagez votre engagement</div>
        <div className="share-sub">Invitez vos proches à soutenir A-Sabil</div>
        <div className="share-btns">
          <a href="https://www.facebook.com/sharer/sharer.php?u=https://a-sabil.org" target="_blank" className="share-btn share-fb">
            <span>f</span> Facebook
          </a>
          <a href="https://twitter.com/intent/tweet?text=Je viens de faire un don à A-Sabil pour soutenir le Mali 🤲&url=https://a-sabil.org" target="_blank" className="share-btn share-tw">
            <span>𝕏</span> Twitter
          </a>
          <a href="https://wa.me/?text=J'ai soutenu A-Sabil, une association humanitaire qui agit au Mali. Si tu veux aussi : https://a-sabil.org" target="_blank" className="share-btn share-wa">
            <span>💬</span> WhatsApp
          </a>
          <button className="share-btn share-copy" onClick={handleCopy}>
            {copied ? '✓ Copié !' : '🔗 Copier le lien'}
          </button>
        </div>
      </div>

      {/* BACK CTAS */}
      <div className="back-ctas">
        <a href="#" className="btn-back-home">Retour à l'accueil</a>
        <a href="don.html" className="btn-another-don">Faire un autre don</a>
      </div>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
